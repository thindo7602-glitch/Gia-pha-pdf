<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia phả họ Đỗ</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html,body{
            width:100%;
            height:100%;
            overflow:hidden;
            background:#f5f5f5;
            font-family:Arial,Helvetica,sans-serif;
        }

        .header{
            height:55px;
            background:#24292f;
            color:white;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 20px;
            font-size:18px;
            font-weight:bold;
        }

        .btn{
            background:#2da44e;
            color:white;
            padding:8px 16px;
            border-radius:6px;
            text-decoration:none;
            font-size:14px;
        }

        iframe{
            width:100%;
            height:calc(100vh - 55px);
            border:none;
            background:white;
        }
    </style>
</head>

<body>

<div class="header">
    <div>📖 Gia phả họ Đỗ</div>

    <a class="btn" href="index.pdf" target="_blank">
        Mở toàn màn hình
    </a>
</div>

<iframe src="index.pdf"></iframe>

</body>
</html>
